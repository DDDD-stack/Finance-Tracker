<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <header>
    <h1>Finance Tracker</h1>
    <button id="btn-open-add">+ Add Transaction</button>
  </header>

  <main>

    <!-- SUMMARY CARDS -->
    <div class="summary-grid">
      <div class="card income">
        <p class="card-label">Income</p>
        <p class="card-amount" id="summary-income">$0.00</p>
      </div>
      <div class="card expense">
        <p class="card-label">Expenses</p>
        <p class="card-amount" id="summary-expense">$0.00</p>
      </div>
      <div class="card balance">
        <p class="card-label">Balance</p>
        <p class="card-amount" id="summary-balance">$0.00</p>
      </div>
    </div>

    <!-- TRANSACTION TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Category</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="transaction-body"></tbody>
      </table>
    </div>

    <!-- SAVINGS GOAL -->
    <div class="goal-section-wrap">
      <div class="goal-section-header">
        <h2>Savings Goal</h2>
      </div>
      <div id="goal-section">
        <!-- Rendered by goals.js -->
      </div>
    </div>

  </main>

  <!-- ADD / EDIT TRANSACTION MODAL -->
  <div id="modal-overlay" class="hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Add Transaction</h2>
        <button id="btn-close-modal">✕</button>
      </div>
      <form id="transaction-form">
        <input type="hidden" id="field-id"/>
        <div class="form-group">
          <label for="field-date">Date</label>
          <input type="date" id="field-date" required/>
        </div>
        <div class="form-group">
          <label for="field-description">Description</label>
          <input type="text" id="field-description" placeholder="e.g. Monthly salary" required/>
        </div>
        <div class="form-group">
          <label for="field-amount">Amount ($)</label>
          <input type="number" id="field-amount" placeholder="0.00" min="0.01" step="0.01" required/>
        </div>
        <div class="form-group">
          <label>Type</label>
          <div class="radio-group">
            <label><input type="radio" name="type" value="income" checked/> Income</label>
            <label><input type="radio" name="type" value="expense"/> Expense</label>
          </div>
        </div>
        <div class="form-group" id="category-group" style="display:none;">
          <label for="field-category">Category</label>
          <select id="field-category">
            <option value="">Select…</option>
            <option>Food</option>
            <option>Housing</option>
            <option>Transport</option>
            <option>Health</option>
            <option>Entertainment</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DELETE CONFIRMATION -->
  <div id="confirm-overlay" class="hidden">
    <div class="modal modal-sm">
      <h2>Delete this transaction?</h2>
      <p>This cannot be undone.</p>
      <div class="form-actions">
        <button id="btn-cancel-delete">Cancel</button>
        <button id="btn-confirm-delete" class="btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- SAVINGS GOAL MODAL -->
  <div id="goal-modal-overlay" class="hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Savings Goal</h2>
        <button id="btn-close-goal-modal">✕</button>
      </div>
      <form id="goal-form">
        <div class="form-group">
          <label for="goal-field-name">Goal Name</label>
          <input type="text" id="goal-field-name" placeholder="e.g. Vacation, New laptop" required/>
        </div>
        <div class="form-group">
          <label for="goal-field-target">Target Amount ($)</label>
          <input type="number" id="goal-field-target" placeholder="0.00" min="1" step="0.01" required/>
        </div>
        <div class="form-group">
          <label for="goal-field-saved">Already Saved ($)</label>
          <input type="number" id="goal-field-saved" placeholder="0.00" min="0" step="0.01" value="0"/>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel-goal">Cancel</button>
          <button type="submit">Save Goal</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/core/storage.js"></script>
  <script src="js/core/utils.js"></script>
  <script src="js/ui/render.js"></script>
  <script src="js/features/goal/goals.js"></script>
  <script src="js/ui/modal.js"></script>

</body>
</html>
